spring.application.name=sms

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/student_management}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:@1234savitha}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=${JWT_SECRET:fallbackSecretKeyWithAtLeast256BitsForSecurityPurpose}
jwt.access.expiration=${JWT_ACCESS_EXP:3600000}
jwt.refresh.expiration=${JWT_REFRESH_EXP:604800000}

# Server Configuration
server.port=${PORT:8080}